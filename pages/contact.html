<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .contact-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .email-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .email-icon {
            font-size: 24px;
        }

        .email-link {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .email-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .social-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .social-link:hover {
            background: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        .social-link.linkedin {
            background: #0077b5;
        }

        .social-link.linkedin:hover {
            background: #005885;
        }

        .social-link.facebook {
            background: #1877f2;
        }

        .social-link.facebook:hover {
            background: #0a66c2;
        }

        .downloads-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            background: #667eea;
            color: white;
            border-color: #764ba2;
            transform: translateX(5px);
        }

        .download-icon {
            font-size: 20px;
        }

        .download-info {
            flex: 1;
        }

        .download-filename {
            font-weight: 600;
            font-size: 15px;
        }

        .download-type {
            font-size: 12px;
            opacity: 0.7;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .copy-feedback {
            display: none;
            color: #28a745;
            font-size: 12px;
            margin-left: 10px;
        }

        .copy-feedback.show {
            display: inline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .social-link {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .copy-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Me</h1>
        <p class="subtitle">Get in touch via email, social media, or download my documents</p>

        <!-- Email Section -->
        <div class="contact-section">
            <div class="section-title">📧 Email</div>
            <div class="email-container">
                <span class="email-icon">✉️</span>
                <a href="mailto:sergesclv@gmail.com" class="email-link">sergesclv@gmail.com</a>
                <button class="copy-btn" onclick="copyToClipboard('sergesclv@gmail.com', this)">Copy</button>
                <span class="copy-feedback"></span>
            </div>
        </div>

        <!-- Social Media Section -->
        <div class="contact-section">
            <div class="section-title">🔗 Social Media</div>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/serge-sokolov-abb5319/" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="social-link linkedin" 
                   title="LinkedIn">
                    in
                </a>
                <a href="https://www.facebook.com/sergesclv/" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="social-link facebook" 
                   title="Facebook">
                    f
                </a>
            </div>
        </div>

        <!-- Downloads Section -->
        <div class="contact-section">
            <div class="section-title">📥 Download Files</div>
            <div class="downloads-container">
                <a href="./downloads/b_plan03072026.pdf" 
                   download 
                   class="download-link">
                    <span class="download-icon">📄</span>
                    <div class="download-info">
                        <div class="download-filename">b_plan03072026.pdf</div>
                        <div class="download-type">PDF Document</div>
                    </div>
                </a>
                <a href="./downloads/f_plan03072026.xlsx" 
                   download 
                   class="download-link">
                    <span class="download-icon">📊</span>
                    <div class="download-info">
                        <div class="download-filename">f_plan03072026.xlsx</div>
                        <div class="download-type">Excel Spreadsheet</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const feedback = button.nextElementSibling;
                feedback.textContent = '✓ Copied!';
                feedback.classList.add('show');
                
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('Failed to copy email address');
            });
        }
    </script>
</body>
</html>
